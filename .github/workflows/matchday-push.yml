name: Matchday Push Content

on:
  schedule:
    # GitHub cron uses UTC. 01:30 UTC = 09:30 Asia/Shanghai.
    # The script exits cleanly when the API returns no matches for the date.
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional match date, YYYY-MM-DD"
        required: false
        default: ""
      limit:
        description: "Max matches to process"
        required: false
        default: "12"
      dry_run:
        description: "Save JSON but skip Feishu write"
        required: false
        default: "false"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-5.5' }}
      FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
      FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      X_COOKIES: ${{ secrets.X_COOKIES }}
      X_BASE_URL: https://x.com
      X_EXPLORE_URL: https://x.com/i/jf/global-trending/home
      MATCHDAY_MAX_MATCHES: ${{ inputs.limit || '12' }}
      MATCHDAY_X_LIMIT: "80"
      MATCHDAY_DAILY_PUSH_TARGET: "10"
      MATCHDAY_MAX_PUSHES_PER_MATCH: "10"
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      TIMEZONE: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Generate matchday push content
        env:
          MATCHDAY_DATE: ${{ inputs.date }}
        run: |
          args=(matchday --limit "${MATCHDAY_MAX_MATCHES}")
          if [ -n "${MATCHDAY_DATE}" ]; then
            args+=(--date "${MATCHDAY_DATE}")
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          python main.py "${args[@]}"

      - name: Upload generated JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matchday-outputs
          path: outputs/*.json
          if-no-files-found: ignore
